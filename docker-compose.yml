services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: convergeai-postgres
    environment:
      POSTGRES_DB: convergeai
      POSTGRES_USER: converge
      POSTGRES_PASSWORD: converge
    ports:
      # Host port 5433 avoids colliding with a natively installed PostgreSQL.
      - "5433:5432"
    volumes:
      - convergeai_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U converge -d convergeai"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: convergeai-backend
    profiles: ["full"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/convergeai
      DATABASE_USERNAME: converge
      DATABASE_PASSWORD: converge
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://localhost:8081
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8080
    container_name: convergeai-frontend
    profiles: ["full"]
    depends_on:
      - backend
    ports:
      - "8081:80"

volumes:
  convergeai_pgdata:
